<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlucoCarePlus — Portal Médico</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--gray-400);
      transition: var(--transition);
    }
    .login-eye:hover { color: var(--teal-500); }
    .login-eye svg { width: 17px; height: 17px; }
    .pw-wrap { position: relative; }
    .login-divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }
    .login-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: var(--gray-200);
    }
    .login-divider span {
      background: var(--white);
      padding: 0 12px;
      font-size: 0.75rem;
      color: var(--gray-400);
      position: relative;
    }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }
    .login-error {
      background: #fff5f5;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
    }
    .floating-shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>
  <div class="login-page">

    <!-- RIGHT PANEL -->
    <div class="login-right">
      <div class="login-form-wrap">
        <h2 class="login-title">Bienvenido a GlucoCarePlus</h2>
        <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

        <div id="login-error" class="login-error">
          <strong>Aviso.</strong> <span id="login-error-text">Verifica tus datos.</span>
        </div>

        <div id="login-form-box">
        <div class="form-group">
          <label class="form-label">Usuario o correo</label>
          <input
            type="email" 
            id="login-user" 
            name="glucocare_login_user_empty"
            class="form-control"
            placeholder="Usuario o correo"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="pw-wrap">
            <input
              type="password" 
              id="login-pw" 
              name="glucocare_login_password_empty"
              class="form-control"
              placeholder="Contraseña"
              style="padding-right:44px"
              autocomplete="new-password"
            />
            <span class="login-eye" id="toggle-pw">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </span>
          </div>
        </div>

        <button class="login-btn" id="login-btn" onclick="doLogin()">
          Ingresar al portal
        </button>

        <div class="login-forgot">
          <a href="#" style="color:var(--teal-500)" onclick="showRegister();return false;">Crear cuenta médica</a>
        </div>

        <div id="register-form-box" style="display:none">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input id="reg-nombre" type="text" class="form-control" placeholder="Nombre" />
          </div>
          <div class="form-group">
            <label class="form-label">Apellido</label>
            <input id="reg-apellido" type="text" class="form-control" placeholder="Apellido" />
          </div>
          <div class="form-group">
            <label class="form-label">Correo</label>
            <input id="reg-email" type="email" class="form-control" placeholder="doctor@correo.com" />
          </div>
          <div class="form-group">
            <label class="form-label">Especialidad</label>
            <input id="reg-especialidad" type="text" class="form-control" placeholder="Endocrinología" />
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input id="reg-password" type="password" class="form-control" placeholder="••••••••" />
          </div>
          <button class="login-btn" id="register-btn" onclick="doRegister()">
            Registrarme
          </button>
          <div class="login-forgot">
            <a href="#" style="color:var(--teal-500)" onclick="showLogin();return false;">Ya tengo cuenta</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const userInput = document.getElementById('login-user');
        const passwordInput = document.getElementById('login-pw');

        if (userInput) userInput.value = '';
        if (passwordInput) passwordInput.value = '';
      }, 100);
    });
    
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('login-pw');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('login-pw').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    function showMessage(text, isError = true) {
      const box = document.getElementById('login-error');
      const msg = document.getElementById('login-error-text');
      msg.textContent = text;
      box.style.display = 'block';
      box.style.background = isError ? '#fff5f5' : '#f0fdf4';
      box.style.borderColor = isError ? '#fecaca' : '#bbf7d0';
      box.style.color = isError ? '#b91c1c' : '#166534';
    }

    function showRegister() {
      document.getElementById('login-form-box').style.display = 'none';
      document.getElementById('register-form-box').style.display = 'block';
      document.querySelector('.login-title').textContent = 'Registro médico';
      document.querySelector('.login-subtitle').textContent = 'Crea tu cuenta para ingresar al portal';
      document.getElementById('login-error').style.display = 'none';
    }

    function showLogin() {
      document.getElementById('register-form-box').style.display = 'none';
      document.getElementById('login-form-box').style.display = 'block';
      document.querySelector('.login-title').textContent = 'Bienvenido a GlucoCarePlus';
      document.querySelector('.login-subtitle').textContent = 'Ingresa tus credenciales para continuar';
      document.getElementById('login-error').style.display = 'none';
    }

    async function doLogin() {
      const email = document.getElementById('login-user').value.trim();
      const password = document.getElementById('login-pw').value.trim();

      console.log('email:', email);
      console.log('password:', password);
      try {
        const response = await fetch('api/login.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        })

        const data = await response.json();

        if (data.ok) {
          localStorage.setItem('glucocare_medico', JSON.stringify(data.medico));
          document.getElementById('login-btn').textContent = 'Ingresando...';
          window.location.href = 'index.html';
        } else {
          showMessage(data.message || 'Credenciales incorrectas');
        }
      } catch (error) {
        showMessage('No se pudo conectar con el servidor. Revisa XAMPP y MySQL.');
      }
    }

    async function doRegister() {
      const payload = {
        nombre: document.getElementById('reg-nombre').value.trim(),
        apellido: document.getElementById('reg-apellido').value.trim(),
        email: document.getElementById('reg-email').value.trim(),
        especialidad: document.getElementById('reg-especialidad').value.trim(),
        password: document.getElementById('reg-password').value.trim()
      };

      try {
        const response = await fetch('api/register.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (data.ok) {
          showMessage('Registro creado correctamente. Ahora puedes iniciar sesión.', false);
          showLogin();
        } else {
          showMessage(data.message || 'No se pudo crear el registro');
        }
      } catch (error) {
        showMessage('No se pudo conectar con el servidor. Revisa XAMPP y MySQL.');
      }
    }
  </script>
</body>
</html>
